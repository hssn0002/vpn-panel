<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل کاربر</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="loadingScreen" class="login-container"><div class="spinner"></div><span style="color:var(--text-dim);margin-right:10px;">در حال بارگذاری...</span></div>

  <div id="userPanel" class="user-panel" style="display:none;">
    <div class="user-header">
      <h1 id="userWelcome">👋 خوش آمدید</h1>
      <p class="welcome">اطلاعات اشتراک شما</p>
    </div>

    <div class="info-card">
      <div class="info-grid">
        <div class="info-item"><div class="label">📊 مانده حجم</div><div class="value" id="remainingVolume">--</div></div>
        <div class="info-item"><div class="label">⏳ مانده زمان</div><div class="value" id="remainingDays">--</div></div>
        <div class="info-item"><div class="label">📦 حجم کل</div><div class="value" id="totalVolume" style="font-size:1em;color:var(--text-dim);">--</div></div>
        <div class="info-item"><div class="label">📋 تعداد کانفیگ</div><div class="value" id="configCount" style="font-size:1em;color:var(--text-dim);">--</div></div>
      </div>
    </div>

    <button class="copy-btn-big"><span id="copySubBtn">🔗 کپی لینک اشتراک</span></button>

    <!-- Chat -->
    <div class="user-chat">
      <button class="chat-toggle-btn" onclick="toggleChat()">💬 چت با پشتیبانی <span id="chatBadge" class="notif-badge" style="display:none;">0</span></button>
      <div class="chat-container" id="chatContainer">
        <div class="chat-messages" id="userChatMessages"></div>
        <div class="chat-input-area">
          <input type="file" id="imgInput" accept="image/*" style="display:none;" onchange="sendImage()" />
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('imgInput').click()">📷</button>
          <input type="text" id="chatInput" placeholder="پیام..." onkeydown="if(event.key==='Enter')sendMsg()" />
          <button onclick="sendMsg()">ارسال</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/user.js"></script>
</body>
</html>
